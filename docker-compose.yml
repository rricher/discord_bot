services:
  discord-bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - VIRTUAL_HOST=discord-bot.ryanricher.com
      - LETSENCRYPT_HOST=discord-bot.ryanricher.com
      - VIRTUAL_PORT=3000
    volumes:
      - ./cookies.txt:/app/cookies.txt:ro
    networks:
      - proxy

  nginx-proxy:
    image: nginxproxy/nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - nginx-certs:/etc/nginx/certs
      - nginx-vhost:/etc/nginx/vhost.d
      - nginx-html:/usr/share/nginx/html
    networks:
      - proxy

  acme-companion:
    image: nginxproxy/acme-companion
    restart: unless-stopped
    environment:
      - DEFAULT_EMAIL=ryanricher@gmail.com
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - nginx-certs:/etc/nginx/certs
      - nginx-vhost:/etc/nginx/vhost.d
      - nginx-html:/usr/share/nginx/html
      - acme:/etc/acme.sh
    depends_on:
      - nginx-proxy
    networks:
      - proxy

volumes:
  nginx-certs:
  nginx-vhost:
  nginx-html:
  acme:

networks:
  proxy:
    name: proxy
